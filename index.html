      /* Banner Improvements: Zoom + Overlay + Text */
      .card-banner {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
      }
      .card-banner .banner {
        display: block;
        width: 100%;
        height: auto;
        animation: zoomIn 20s ease-in-out infinite alternate;
      }
      .card-banner::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(25, 3, 148, 0.1);
        mix-blend-mode: multiply;
        pointer-events: none;
      }
      .banner-text {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: #FFF;
        font-size: 1rem;
        font-weight: 700;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
        opacity: 0;
        animation: fadeInText 2s ease-out 1s forwards;
      }
      @keyframes zoomIn {
        from {
          transform: scale(1);
        }
        to {
          transform: scale(1.05);
        }
      }
      @keyframes fadeInText {
        to {
          opacity: 1;
        }
      }
      /* Button Base + Effects */
      .card-actions {

        gap: 12px;

        border-radius: 8px;
        text-align: center;
        text-decoration: none;

        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 4px 6px rgba(0, 0, 0, 0.4);
      }

      .card-actions .btn-daftar {
        overflow: hidden;
        background-image: linear-gradient(to bottom, #ffa6a6 0%, #922323 50%, #ff0000 100%);
        box-shadow: inset 0 0 0 1px #ff0000, inset 0 2px 0 0 #ff0000, inset 0 4px 4px 2px #800000, 3px 3px 3px 1px rgba(0, 0, 0, 0.2);
        border: 1px solid #ff0000;
        color: #FFF;
        transition: background .3s, transform .2s, box-shadow .3s;
      }
      .card-actions .btn-daftar::before {
        content: '';
        position: absolute;
        top: 0;
        left: -120%;
        width: 50%;
        height: 100%;
        background: linear-gradient(60deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.6) 50%, rgba(255, 255, 255, 0) 100%);
        transform: skewX(-20deg);
        animation: shimmer 2s infinite;

        background-clip: padding-box, border-box;
      }
      .card-actions .btn-login::before {
        content: '';
        position: absolute;
        inset: 0;
        background: inherit;
        filter: blur(8px);
        opacity: .7;
        animation: slide 3s infinite linear;
        z-index: -1;
      }
      .card-actions .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 8px 12px rgba(0, 0, 0, 0.5);

      @keyframes shimmer {

          left: -120%;
        }
        100% {
          left: 120%;
        }
      }
      @keyframes slide {

          background-position: 0 0;
        }
        100% {
